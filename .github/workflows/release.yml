name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller launcher.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc src/installer/windows/setup.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src/installer/windows/Output/AgentEnvironmentLauncher-Setup.exe

  macos-arm-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build DMG
        run: |
          chmod +x src/installer/macos/build_dmg.sh
          src/installer/macos/build_dmg.sh arm64

      - name: Upload macOS ARM DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-dmg
          path: dist/*.dmg

  linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install libfuse2
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Build AppImage
        run: |
          chmod +x src/installer/linux/build_appimage.sh
          src/installer/linux/build_appimage.sh x86_64

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  release:
    needs: [windows-build, macos-arm-build, linux-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
