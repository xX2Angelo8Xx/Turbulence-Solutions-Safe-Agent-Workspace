name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.0.1) — must already exist on the target commit'
        required: true
        default: 'v3.0.1'

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "TAG=$TAG"
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check config.py VERSION
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          ACTUAL=$(grep -oP 'VERSION\s*(?::\s*str\s*)?\=\s*"\K[^"]+' src/launcher/config.py || true)
          echo "Expected: $VERSION"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "ERROR: src/launcher/config.py VERSION mismatch." >&2
            exit 1
          fi
          echo "OK: src/launcher/config.py"

      - name: Check pyproject.toml version
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          ACTUAL=$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml || true)
          echo "Expected: $VERSION"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "ERROR: pyproject.toml version mismatch." >&2
            exit 1
          fi
          echo "OK: pyproject.toml"

      - name: Check setup.iss MyAppVersion
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          ACTUAL=$(grep -oP '#define MyAppVersion "\K[^"]+' src/installer/windows/setup.iss || true)
          echo "Expected: $VERSION"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "ERROR: src/installer/windows/setup.iss MyAppVersion mismatch." >&2
            exit 1
          fi
          echo "OK: src/installer/windows/setup.iss"

      - name: Check build_dmg.sh APP_VERSION
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          ACTUAL=$(grep -oP 'APP_VERSION="\K[^"]+' src/installer/macos/build_dmg.sh || true)
          echo "Expected: $VERSION"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "ERROR: src/installer/macos/build_dmg.sh APP_VERSION mismatch." >&2
            exit 1
          fi
          echo "OK: src/installer/macos/build_dmg.sh"

      - name: Check build_appimage.sh APP_VERSION
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          ACTUAL=$(grep -oP 'APP_VERSION="\K[^"]+' src/installer/linux/build_appimage.sh || true)
          echo "Expected: $VERSION"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "ERROR: src/installer/linux/build_appimage.sh APP_VERSION mismatch." >&2
            exit 1
          fi
          echo "OK: src/installer/linux/build_appimage.sh"

      - name: Version validation summary
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          echo "All 5 version files match tag version: $VERSION"
          echo "  - src/launcher/config.py"
          echo "  - pyproject.toml"
          echo "  - src/installer/windows/setup.iss"
          echo "  - src/installer/macos/build_dmg.sh"
          echo "  - src/installer/linux/build_appimage.sh"

  run-tests:
    needs: [validate-version]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
        continue-on-error: true

      - name: Check regression baseline
        shell: python
        run: |
          import json
          import xml.etree.ElementTree as ET
          import sys

          # Load regression baseline
          with open("tests/regression-baseline.json") as f:
              baseline = json.load(f)
          known = set(baseline.get("known_failures", {}).keys())

          # Parse JUnit XML
          tree = ET.parse("test-results.xml")
          root = tree.getroot()

          failures = set()
          errors = set()
          for suite in root.iter("testsuite"):
              for tc in suite.iter("testcase"):
                  cn = tc.get("classname", "")
                  tn = tc.get("name", "")
                  name = f"{cn}.{tn}"
                  if tc.find("failure") is not None:
                      failures.add(name)
                  if tc.find("error") is not None:
                      errors.add(name)

          all_bad = failures | errors
          new_failures = all_bad - known

          print(f"Total failures+errors: {len(all_bad)}")
          print(f"Known in baseline:     {len(known)}")
          print(f"NEW failures:          {len(new_failures)}")

          if new_failures:
              print("\n--- NEW FAILURES (blocking CI) ---")
              for f in sorted(new_failures)[:50]:
                  print(f"  {f}")
              if len(new_failures) > 50:
                  print(f"  ... and {len(new_failures) - 50} more")
              sys.exit(1)
          else:
              print("\nPASS: No new regressions detected.")

  windows-build:
    needs: [validate-version, run-tests]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller launcher.spec

      # INS-018: Download and extract the Python 3.11 embeddable distribution
      # into src/installer/python-embed/ so it is bundled with the installer.
      # This step must run BEFORE Inno Setup so `PythonEmbedExists()` returns True
      # and the [Files] entry for python-embed is included in the output EXE.
      - name: Download Python embeddable distribution
        run: |
          $version = "3.11.9"
          $url = "https://www.python.org/ftp/python/$version/python-$version-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath src/installer/python-embed/ -Force
          Remove-Item python-embed.zip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc src/installer/windows/setup.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src/installer/windows/Output/AgentEnvironmentLauncher-Setup.exe

  release:
    needs: [windows-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tags (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: git fetch --tags

      - name: Validate tag exists (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if ! git tag -l "$TAG" | grep -qx "$TAG"; then
            echo "Error: tag '$TAG' does not exist in the repository." >&2
            exit 1
          fi
          echo "Tag '$TAG' found."

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release (Draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release-assets/**/*
          generate_release_notes: true
          draft: true
