name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller launcher.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc src/installer/windows/setup.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src/installer/windows/Output/AgentEnvironmentLauncher-Setup.exe

  macos-intel-build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller launcher.spec

      - name: Build DMG
        run: |
          chmod +x src/installer/macos/build_dmg.sh
          src/installer/macos/build_dmg.sh x86_64

      - name: Upload macOS Intel DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-dmg
          path: dist/*.dmg

  macos-arm-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller launcher.spec

      - name: Build DMG
        run: |
          chmod +x src/installer/macos/build_dmg.sh
          src/installer/macos/build_dmg.sh arm64

      - name: Upload macOS ARM DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-dmg
          path: dist/*.dmg

  linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  release:
    needs: [windows-build, macos-intel-build, macos-arm-build, linux-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
