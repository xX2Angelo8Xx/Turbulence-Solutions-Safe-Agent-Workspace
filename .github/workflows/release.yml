name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.0.1) — must already exist on the target commit'
        required: true
        default: 'v3.0.1'

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller launcher.spec

      # INS-018: Download and extract the Python 3.11 embeddable distribution
      # into src/installer/python-embed/ so it is bundled with the installer.
      # This step must run BEFORE Inno Setup so `PythonEmbedExists()` returns True
      # and the [Files] entry for python-embed is included in the output EXE.
      - name: Download Python embeddable distribution
        run: |
          $version = "3.11.9"
          $url = "https://www.python.org/ftp/python/$version/python-$version-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath src/installer/python-embed/ -Force
          Remove-Item python-embed.zip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc src/installer/windows/setup.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src/installer/windows/Output/AgentEnvironmentLauncher-Setup.exe

  macos-arm-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build DMG
        run: |
          chmod +x src/installer/macos/build_dmg.sh
          src/installer/macos/build_dmg.sh arm64

      - name: Verify Code Signing
        run: |
          codesign --verify dist/launcher/launcher && echo "Main executable signature valid"
          codesign --verify --deep dist/AgentEnvironmentLauncher.app/Contents/MacOS/_internal/Python.framework && echo "Python.framework signature valid"
          echo "Code signing verification passed"

      - name: Upload macOS ARM DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-dmg
          path: dist/*.dmg

  linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install libfuse2
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Build AppImage
        run: |
          chmod +x src/installer/linux/build_appimage.sh
          src/installer/linux/build_appimage.sh x86_64

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  release:
    needs: [windows-build, macos-arm-build, linux-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Validate tag exists (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if ! git tag -l "$TAG" | grep -qx "$TAG"; then
            echo "Error: tag '$TAG' does not exist in the repository." >&2
            exit 1
          fi
          echo "Tag '$TAG' found."

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release-assets/**/*
          generate_release_notes: true
